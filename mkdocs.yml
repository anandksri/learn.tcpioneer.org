site_name: TCP Handbook
site_description: Learn Cybersecurity, Linux, Python, Networking & Ethical Hacking with practical tutorials and real-world examples.
site_author: TC Pioneer
site_url: https://learn.tcpioneer.org

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico

  palette:
    - scheme: slate
      primary: black
      accent: blue

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.top
    - navigation.footer
    - navigation.instant
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/custom.js

extra:
  canonical_url: https://learn.tcpioneer.org

plugins:
  - search

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anandksri

extra_head:
  - |
    <meta name="keywords" content="cybersecurity tutorial, linux tutorial, python tutorial, ethical hacking, networking basics, kali linux tools, bug bounty, tcp handbook">
    <meta name="author" content="TC Pioneer">
    <meta property="og:title" content="TCP Handbook - Cybersecurity Learning Platform">
    <meta property="og:description" content="Master Cybersecurity, Linux, Python and Ethical Hacking with structured tutorials.">
    <meta property="og:url" content="https://learn.tcpioneer.org">
    <meta property="og:type" content="website">

